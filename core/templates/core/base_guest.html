{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WishList{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
</head>
<body>

<!-- Лэйаут для неавторизованного пользователя -->
<div class="guest-layout">
    <header class="guest-header">
        <div class="brand">wish<span>list</span></div>
        <div class="guest-header-actions">
            <a href="{% url 'public_feed' %}" class="btn-outline-sm">Идеи подарков</a>
            <a href="{% url 'login' %}" class="btn-main-sm">Войти</a>
        </div>
    </header>
    <main class="guest-main">
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</div>

</body>
</html>
